name: kumpra
description: KUMPRA - Hyper-Local Cluster Delivery System for Bacolod City

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
